name = "zakati"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ----------------------------------------------------------------------------
# Environment variables — set actual values via:
#   wrangler pages secret put NEXT_PUBLIC_SANITY_PROJECT_ID --project-name zakati
# ----------------------------------------------------------------------------
[vars]
NEXT_PUBLIC_SANITY_DATASET = "production"

# ----------------------------------------------------------------------------
# Production environment
# ----------------------------------------------------------------------------
[env.production]
name = "zakati"

[env.production.vars]
NEXT_PUBLIC_SANITY_DATASET = "production"

# ----------------------------------------------------------------------------
# Preview environment (branch deploys)
# ----------------------------------------------------------------------------
[env.preview]
name = "zakati-preview"

[env.preview.vars]
NEXT_PUBLIC_SANITY_DATASET = "preview"
